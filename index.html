<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyundai Coatza</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #ffffff;
}

body {
  display: flex;
  flex-direction: column;
}

header {
  background: #003A8F;
  color: white;
  padding: 10px;
  text-align: center;
  flex-shrink: 0;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

.bienvenida {
  text-align: center;
  padding: 8px 20px;
  color: #003A8F;
  font-size: 14px;
  max-width: 1100px;
  margin: 0 auto;
  line-height: 1.3;
  flex-shrink: 0;
}

/* 🔥 MENÚ FLEXIBLE */
.menu {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px;
  flex-shrink: 0;
}

.menu a {
  text-decoration: none;
  padding: 8px 10px;
  color: white;
  border-radius: 6px;
  font-size: 13px;
  font-weight: bold;
  text-align: center;
  transition: transform 0.2s, background-color 0.2s;
  
  /* 🔥 MÁXIMO 6 BOTONES POR RENGLÓN */
  flex: 1 1 calc((100% / 6) - 10px);
  max-width: calc((100% / 6) - 10px);
  min-width: 140px; /* En pantallas de celulares se ajustarán a menos columnas */
  
  /* Alineación de texto interno por si hay nombres largos */
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
}

.menu a:hover {
  transform: scale(1.05);
}

/* 🔥 PALETA DE COLORES POR ORIGEN */
/* Ventas (Azul Base Hyundai) */
.btn-ventas { background: #003A8F; }
.btn-ventas:hover { background: #00265e; }

/* Servicio (Azul más claro/vivo) */
.btn-servicio { background: #005696; }
.btn-servicio:hover { background: #003f6f; }

/* Gerencia (Azul Marino Profundo) */
.btn-gerencia { background: #001C42; }
.btn-gerencia:hover { background: #000c1f; }


/* 🔥 CARRUSEL DINÁMICO REAL */
.carousel {
  flex: 1;
  min-height: 0; 
  position: relative;
  background: white;
  width: 100%;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.8s ease-in-out;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slide.active {
  opacity: 1;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* ajusta automáticamente sin deformar */
}

/* loader */
.loader {
  color: #003A8F;
  font-size: 16px;
}
</style>
</head>

<body>

<header>
  <h1>Hyundai Coatza</h1>
</header>

<div class="bienvenida" id="mensaje">
  Cargando herramientas...
</div>

<div class="menu" id="menu"></div>

<div class="carousel" id="carousel">
  <div class="loader">Actualizando galería...</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxg4j7SZA1755E81dkT3ZAF-1swDrmPsrbjVJQosripVnxI2_WbXKR_2y7aNYtRRQpTdA/exec";

let current = 0;
let slides = [];

/* CACHE SOLO PARA CARRUSEL */
function cacheSet(key, data) {
  localStorage.setItem(key, JSON.stringify({time: Date.now(), data}));
}

function cacheGet(key, mins = 2) {
  const cache = localStorage.getItem(key);
  if (!cache) return null;
  const obj = JSON.parse(cache);
  if ((Date.now() - obj.time) / 60000 > mins) return null;
  return obj.data;
}

/* DRIVE */
function convertirDrive(url) {
  if (!url) return "";
  const match = url.match(/(?:id=|\/d\/)([-\w]{25,})/);
  if (match && match[1]) {
    return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1200`;
  }
  return url;
}

/* MENSAJE */
async function cargarMensaje() {
  try {
    const res = await fetch(API + "?action=getConfig&nocache=" + Date.now());
    const data = await res.json();
    document.getElementById("mensaje").textContent =
      data.mensaje || "Bienvenidos equipo";
  } catch (e) {
    console.error(e);
  }
}

/* 🔥 MENÚ SIN CACHE CON COLORES DINÁMICOS */
async function cargarMenu() {
  try {
    const res = await fetch(API + "?action=getWeb&nocache=" + Date.now());
    const data = await res.json();

    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    data.forEach(item => {
      if (item.nombre && item.url) {
        const a = document.createElement("a");
        a.href = item.url;
        a.textContent = item.nombre;
        a.target = "_blank";
        
        // Asignación de color según el "origen" (Ignora mayúsculas o espacios extra)
        const origen = item.origen ? String(item.origen).toLowerCase().trim() : "";
        
        if (origen === "ventas") {
          a.classList.add("btn-ventas");
        } else if (origen === "servicio" || origen === "servicios") {
          a.classList.add("btn-servicio");
        } else if (origen === "gerencia") {
          a.classList.add("btn-gerencia");
        } else {
          // Color por defecto si la celda está vacía o tiene otra cosa
          a.classList.add("btn-ventas"); 
        }

        menu.appendChild(a);
      }
    });

  } catch (e) {
    console.error(e);
  }
}

/* CARRUSEL */
async function cargarCarrusel() {

  let data = cacheGet("carrusel");

  if (!data) {
    try {
      const res = await fetch(API + "?action=getCarrusel");
      data = await res.json();
      cacheSet("carrusel", data);
    } catch (e) {
      console.error(e);
    }
  }

  const container = document.getElementById("carousel");
  container.innerHTML = "";

  data.forEach((item, i) => {

    const div = document.createElement("div");
    div.className = "slide";
    if (i === 0) div.classList.add("active");

    const img = document.createElement("img");
    img.src = convertirDrive(item.url);

    img.onerror = () => {
      img.src = "https://via.placeholder.com/800x400?text=Imagen+no+disponible";
    };

    div.appendChild(img);
    container.appendChild(div);
  });

  slides = document.querySelectorAll(".slide");

  if (slides.length > 0) {
    if (window.carruselInterval) clearInterval(window.carruselInterval);

    window.carruselInterval = setInterval(() => {
      slides[current].classList.remove("active");
      current = (current + 1) % slides.length;
      slides[current].classList.add("active");
    }, 4500);
  }
}

/* INIT */
cargarMensaje();
cargarMenu();
cargarCarrusel();

</script>

</body>
</html>
