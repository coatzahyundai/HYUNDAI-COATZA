<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyundai Coatza</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff; /* 🔥 todo blanco */
  overflow: hidden;
}

header {
  background: #003A8F;
  color: white;
  padding: 15px;
  text-align: center;
}

.menu {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
}

.menu a {
  text-decoration: none;
  padding: 10px 20px;
  background: #003A8F;
  color: white;
  border-radius: 8px;
}

.carousel {
  width: 100%;
  height: calc(100vh - 140px);
  position: relative;
  background: white; /* 🔥 quitamos negro */
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1s;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slide.active {
  opacity: 1;
}

.slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  background: white; /* 🔥 evita franjas negras */
}

/* loader */
.loader {
  color: #003A8F;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 20px;
}
</style>
</head>

<body>

<header>
  <h1>Hyundai Coatza</h1>
</header>

<div class="menu" id="menu"></div>

<div class="carousel" id="carousel">
  <div class="loader">Cargando imágenes...</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx4mvQBt0US3Ywh0UpiBSc-hrpky8WdjbMLJ24bgM1iOBBzDrh-6P5ij8J_nhD6d0kgdA/exec";

let current = 0;
let slides = [];

// CACHE
function cacheSet(key, data) {
  localStorage.setItem(key, JSON.stringify({
    time: Date.now(),
    data: data
  }));
}

function cacheGet(key, minutes = 5) {
  const cache = localStorage.getItem(key);
  if (!cache) return null;

  const obj = JSON.parse(cache);
  const diff = (Date.now() - obj.time) / 60000;

  if (diff > minutes) return null;

  return obj.data;
}

// DRIVE
function convertirDrive(url) {
  if (!url) return "";
  const match = url.match(/(?:id=|\/d\/)([-\w]{25,})/);
  if (match && match[1]) {
    return `https://lh3.googleusercontent.com/d/${match[1]}`;
  }
  return url;
}

// MENÚ
async function cargarMenu() {

  let data = cacheGet("menu");

  if (!data) {
    const res = await fetch(API + "?action=getWeb");
    data = await res.json();
    cacheSet("menu", data);
  }

  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  data.forEach(item => {
    const a = document.createElement("a");
    a.href = item.url;
    a.textContent = item.nombre;
    a.target = "_blank";
    menu.appendChild(a);
  });
}

// CARRUSEL
async function cargarCarrusel() {

  let data = cacheGet("carrusel");

  if (!data) {
    const res = await fetch(API + "?action=getCarrusel");
    data = await res.json();
    cacheSet("carrusel", data);
  }

  const container = document.getElementById("carousel");
  container.innerHTML = '<div class="loader">Cargando imágenes...</div>';

  let loaded = 0;

  data.forEach((item, i) => {

    const div = document.createElement("div");
    div.className = "slide";
    if (i === 0) div.classList.add("active");

    const img = document.createElement("img");
    img.src = convertirDrive(item.url);

    img.onload = () => {
      loaded++;
      if (loaded === 1) {
        document.querySelector(".loader")?.remove();
      }
    };

    img.onerror = () => {
      img.src = "https://via.placeholder.com/800x400?text=Error+imagen";
    };

    div.appendChild(img);
    container.appendChild(div);
  });

  slides = document.querySelectorAll(".slide");

  if (slides.length > 0) {
    setInterval(() => {
      slides[current].classList.remove("active");
      current = (current + 1) % slides.length;
      slides[current].classList.add("active");
    }, 4000);
  }
}

// INIT
cargarMenu();
cargarCarrusel();

</script>

</body>
</html>
